<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio Intro</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0a0a0a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 60px;
      padding: 40px;
      max-width: 1200px;
    }

    .intro {
      max-width: 500px;
    }

    .intro h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .intro p {
      font-size: 16px;
      color: #999;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .intro button {
      background-color: #44d100;
      border: none;
      padding: 14px 30px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
      box-shadow: 0 0 10px #44d100;
    }

    .profile-img img {
      width: 300px;
      height: 300px;
      object-fit: cover;
      border-radius: 50%;
      border: 5px solid #111;
    }

    .partners {
      margin-top: 60px;
      text-align: center;
    }

    .partners p {
      color: #aaa;
      margin-bottom: 20px;
    }

    .partner-logos {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .partner-logos div {
      background-color: #111;
      padding: 10px 20px;
      border-radius: 8px;
      color: #888;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="intro">
      <h1>Your Name Here</h1>
      <p>
        Intro text: Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
      </p>
      <button>Let’s get started ></button>
    </div>
    <div class="profile-img">
      <img src="https://cdn.wallpapersafari.com/10/13/GNMBrd.jpg" alt="Profile Picture"/>
    </div>
  </div>

  <div class="partners">
    <p align="left">Worked with</p>
    <div class="partner-logos">
      <div>ClickUp</div>
      <div>Dropbox</div>
      <div>Paychex</div>
      <div>Elastic</div>
      <div>Stripe</div>
    </div>
  </div>

  
</body>
</html>
